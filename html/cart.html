<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ Hàng - E-Component</title>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
<link rel="icon" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/icons/cpu.svg" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="../index.html">
                <i class="bi bi-cpu-fill text-info fs-3 me-2"></i>
                <span class="fw-bold tracking-wide text-uppercase text-white">E-Component</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Trang Chủ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html#products-section">Sản Phẩm</a>
                    </li>
                    <li class="nav-item">
                        <button id="theme-toggle" class="btn btn-outline-light rounded-circle p-0 ms-2" onclick="toggleTheme()" style="width: 40px; height: 40px;">
                            <i class="bi bi-moon"></i>
                        </button>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a href="cart.html" class="btn btn-accent rounded-pill px-4 shadow-sm text-dark-blue d-flex align-items-center">
                            <i class="bi bi-cart3 me-2"></i> Giỏ Hàng
                        </a>
                    </li>
                    <li class="nav-item ms-lg-2" id="nav-auth-btn">
                        <!-- Dynamic Login/User Button -->
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="fw-bold text-dark-blue mb-4">Giỏ Hàng Của Bạn</h2>
        <div id="cart-container">
            <p class="text-muted">Giỏ hàng hiện đang trống.</p>
        </div>
        <div class="text-end mt-4">
            <a href="checkout.html" id="checkout-btn" class="btn btn-dark-blue btn-lg rounded-pill px-5 shadow">
                <i class="bi bi-credit-card me-2"></i> Thanh Toán
            </a>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1060;">
        <div id="cartToast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body d-flex align-items-center">
                    <i id="toastIcon" class="bi fs-5 me-2"></i>
                    <span id="toastMessage"></span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Check if cart is empty
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const checkoutBtn = document.getElementById('checkout-btn');
            if (checkoutBtn && cart.length === 0) {
                checkoutBtn.style.pointerEvents = 'none';
                checkoutBtn.classList.add('disabled');
            }
        });
    </script>
</body>
</html>
