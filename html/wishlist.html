<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/icons/cpu.svg" type="image/svg+xml">

    <title>Danh Sách Yêu Thích - E-Component</title>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="../index.html">
                <i class="bi bi-cpu-fill text-info fs-3 me-2"></i>
                <span class="fw-bold tracking-wide text-uppercase text-white">E-Component</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Trang Chủ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html#products-section">Sản Phẩm</a>
                    </li>
                    <li class="nav-item">
                        <button id="theme-toggle" class="btn btn-outline-light rounded-circle p-0 ms-2" onclick="toggleTheme()" style="width: 40px; height: 40px;">
                            <i class="bi bi-moon"></i>
                        </button>
                    </li>
                    <li class="nav-item">
                        <a href="cart.html" class="btn btn-outline-light rounded-pill px-3 shadow-sm d-flex align-items-center me-2">
                            <i class="bi bi-cart3"></i>
                        </a>
                    </li>
                    <li class="nav-item" id="nav-auth-btn"></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="fw-bold text-dark-blue mb-4">Danh Sách Yêu Thích</h2>
        <div id="wishlist-container" class="row g-4">
            <p class="text-muted">Danh sách yêu thích đang trống.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            hienThiWishlist();
        });
    </script>

</html>
